version: '3.8'

services:
  # 1. Base de Datos PostgreSQL
  db:
    image: postgres:17
    container_name: itam_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sql}
      POSTGRES_DB: ${DB_NAME:-itam_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Servidor Backend (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: itam_backend
    restart: always
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./backend:/app # Para que los cambios de código se reflejen sin reiniciar

volumes:
  postgres_data:
